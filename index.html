<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="stylesheet" href="./styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Moedas</title>
</head>

<body>
    <img class="logo" src="./assets/logo.gif" alt="Logo do conversor de moedas">
    <main>
        <label>
            Converter de:
            <select name="moeda" id="moedaDe">
                <option value="real">Real</option>
                <option value="dolar">Dólar</option>
                <option value="euro">Euro</option>
                <option value="libra">Libra</option>
                <option value="bitcoin">Bitcoin</option>
            </select>
        </label>
        <label>
            Para:
            <select name="moeda" id="moedaPara">
                <option value="real">Real</option>
                <option value="dolar">Dólar</option>
                <option value="euro">Euro</option>
                <option value="libra">Libra</option>
                <option value="bitcoin">Bitcoin</option>
            </select>
        </label>
        <label>
            Valor:
            <input placeholder="10.000" type="number" name="valor" id="valor">
        </label>
        <button id="converter">Converter</button>
        <p id="resultado"></p>
        <section>
            <div class="moeda">
                <img class="bandeira" src='./assets/brasil.png' alt="Bandeira do Brasil">
                <p class="nome-moeda">Real</p>
                <p class="valor-moeda" id="real">R$ 0,00</p>
            </div>
            <img class="seta" src="./assets/seta.png" alt="Seta de conversão">
            <div class="moeda">
                <img class="bandeira" src='./assets/eua.png' alt="Bandeira dos Estados Unidos">
                <p class="nome-moeda">Dólar</p>
                <p class="valor-moeda" id="dolar">US$ 0,00</p>
            </div>
        </section>
    </main>
</body>

</html>
